workflows:
  ios-no-sign:
    name: Tuki.pe iOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Flutter pub get
        script: |
          cd frontend/chalao_app
          flutter pub get

      - name: Agregar Google Maps API key
        script: |
          PLIST="frontend/chalao_app/ios/Runner/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :GMSApiKey string AIzaSyDUMMY" "$PLIST" || \
          /usr/libexec/PlistBuddy -c "Set :GMSApiKey AIzaSyDUMMY" "$PLIST"

      - name: Generar Podfile y correr pod install
        script: |
          cd frontend/chalao_app
          flutter precache --ios
          cd ios
          pod install --repo-update

      - name: Build iOS sin codesign
        script: |
          cd frontend/chalao_app
          flutter build ios --release --no-codesign

      - name: Empaquetar .ipa
        script: |
          cd frontend/chalao_app/build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r ../../ipa/Tuki.ipa Payload
          rm -rf Payload

    artifacts:
      - frontend/chalao_app/build/ios/ipa/*.ipa