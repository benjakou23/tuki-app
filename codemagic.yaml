workflows:
  ios-no-sign:
    name: Tuki.pe iOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Pod install
        script: |
          cd ios
          pod install

      - name: Build iOS sin codesign
        script: |
          flutter build ios --release --no-codesign

      - name: Empaquetar .ipa
        script: |
          mkdir -p build/ios/ipa
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r ../ipa/Tuki.ipa Payload
          rm -rf Payload

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - tucorreo@gmail.com
        notify:
          success: true
          failure: true