workflows:
  ios-no-sign:
    name: Tuki.pe iOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Flutter pub get
        script: |
          set -ex
          cd frontend/chalao_app
          flutter pub get

      - name: Build iOS sin codesign
        script: |
          set -ex
          cd frontend/chalao_app
          flutter build ios --release --no-codesign 2>&1 | tee /tmp/build_log.txt
          exit ${PIPESTATUS[0]}

      - name: Empaquetar .ipa
        script: |
          set -ex
          cd frontend/chalao_app/build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r ../../ipa/Tuki.ipa Payload
          rm -rf Payload

    artifacts:
      - frontend/chalao_app/build/ios/ipa/*.ipa
      - /tmp/build_log.txt